baseURL = 'https://julhcam.eu/'
locale = 'en-gb'
title = 'JulHCam'
theme = "archie"
copyright = "© JulhCam"
enableRobotsTXT = true
enableGitInfo = true

# Colour palette https://coolors.co/7b2525-ba6a4c-fbfbee-bbd686-607456

[markup]
  [markup.goldmark]
    [markup.goldmark.extensions]
      [markup.goldmark.extensions.passthrough]
        enable = true
        [markup.goldmark.extensions.passthrough.delimiters]
          block = [['\[', '\]'], ['$$', '$$']]
          inline = [['$', '$'], ['\(', '\)']]

[params]
    mode="toggle" # color-mode → light,dark,toggle or auto
    useCDN=true
    mathjax = true # enable MathJax support
    katex = false # enable KaTeX support
  [params.author]
    email = 'contact@julhcam.eu'
    name = 'JulHCam'

[security]
  allowContent = ['! ^text/html$']
  enableInlineShortcodes = false

  [security.exec]
    allow = ['^(dart-)?sass(-embedded)?$', '^go$', '^git$', '^node$', '^postcss$', '^tailwindcss$', 'pandoc']
    osEnv = ['(?i)^((HTTPS?|NO)_PROXY|PATH(EXT)?|APPDATA|TE?MP|TERM|GO\w+|(XDG_CONFIG_)?HOME|USERPROFILE|SSH_AUTH_SOCK|DISPLAY|LANG|SYSTEMDRIVE|PROGRAMDATA)$']

  [security.funcs]
    getenv = ['^HUGO_', '^CI$']

  [security.http]
    methods = ['(?i)GET|POST']
    urls = ['(?i)^https?://[a-z0-9]', '! ^https?://\d+\.', '! (?i)localhost', '! (?i)^https?://[^/?#]*@']

  [security.node]
    [security.node.permissions]
      allowAddons = ['tailwindcss']
      allowChildProcess = ['tailwindcss']
      allowRead = ['.']
      allowWorker = ['tailwindcss']
      allowWrite = []
      disable = false


[outputs]
  home = ["html","rss"]
  section = ["html"]
  taxonomy = ["html"]
  term = ["html"]

[[menu.main]]
name = "Posts"
url = "/posts"
weight = 1

[[menu.main]]
name = "Papers"
url = "/publications"
weight = 2.5

[[menu.main]]
name = "About"
url = "/about"
weight = 3

[[menu.main]]
name = "Tags"
url = "/tags"
weight = 4

[[menu.main]]
name = "Search"
url = "/search"
weight = 5

[[params.social]]
name = "email"
icon = "mail"
url = "mailto:contact@julhcam.eu"

[[params.social]]
name = "Github"
icon = "github"
url = "https://github.com/juliohc00/julhcam"

[[params.social]]
